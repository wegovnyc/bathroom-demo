<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Elegant drop shadow to make the pin pop out -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- PWA Solid Background (Standard Rounded Square format) -->
  <rect width="512" height="512" rx="112" fill="#E8F4F8" />

  <!-- The "Toilet Pin" Graphic -->
  <g filter="url(#shadow)">
    <!-- Base Pin Funnel (Back layer) -->
    <!-- Curves gracefully into the point -->
    <path d="M 180 240 Q 210 380 256 460 Q 302 380 332 240 Z" fill="#07aeda" />
    
    <!-- Toilet Tank -->
    <rect x="176" y="80" width="160" height="120" rx="12" fill="#07aeda" />
    <!-- Tank Lid -->
    <rect x="156" y="70" width="200" height="24" rx="8" fill="#07aeda" />
    <!-- Flush lever -->
    <circle cx="204" cy="116" r="8" fill="#ffffff" />
    <rect x="204" y="112" width="28" height="8" rx="4" fill="#ffffff" />

    <!-- Toilet Bowl (Front layer) -->
    <ellipse cx="256" cy="220" rx="104" ry="76" fill="#07aeda" />
    <!-- Inner Bowl / Pin Hole -->
    <ellipse cx="256" cy="226" rx="68" ry="42" fill="#E8F4F8" />
  </g>
</svg>